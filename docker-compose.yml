services:
  n8n:
    image: n8nio/n8n:latest
    container_name: nivara-n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${N8N_WEBHOOK_URL:-http://localhost:5678}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:-changeme}
      - GENERIC_TIMEZONE=Asia/Kolkata
      - TZ=Asia/Kolkata
      - POSTGRES_DB=nivara
      - POSTGRES_USER=nivara
      - POSTGRES_PASSWORD=changeme
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/home/node/workflows:ro
    networks:
      - nivara-net
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: nivara-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - nivara-net
    # Uncomment for GPU support (NVIDIA):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  postgres:
    image: postgres:16-alpine
    container_name: nivara-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-nivara}
      - POSTGRES_USER=${POSTGRES_USER:-nivara}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - nivara-net

  dashboard:
    build: ./dashboard
    container_name: nivara-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
    networks:
      - nivara-net
    depends_on:
      - postgres

volumes:
  n8n_data:
  ollama_data:
  postgres_data:

networks:
  nivara-net:
    driver: bridge
