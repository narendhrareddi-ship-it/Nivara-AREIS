# Permanent deployment for NIVARA dashboard (Streamlit)
# https://render.com/docs/deploy-streamlit

services:
  - type: web
    name: nivara-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r dashboard/requirements.txt
    startCommand: cd dashboard && streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: nivara
      - key: ORCHESTRATOR_URL
        sync: false
      - key: VEO_MCP_URL
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false
